name: Build AutoDump Mod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Grant Gradlew permission
        run: chmod +x gradlew

      - name: Force Gradle wrapper to use 8.3
        run: ./gradlew wrapper --gradle-version 8.3

      - name: Build the mod
        run: ./gradlew build

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: autodump-jar
          path: build/libs/*.jar
