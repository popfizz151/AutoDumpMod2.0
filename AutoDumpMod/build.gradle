plugins {
    id 'fabric-loom' version '1.2-SNAPSHOT'
    id 'java'
}

group = 'com.example'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
    maven { url = 'https://maven.fabricmc.net/' }
    maven { url = 'https://maven.impactdevelopment.org/releases/' }
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.1"
    mappings "net.fabricmc:yarn:1.21.1+build.3:v2"
    modImplementation "net.fabricmc:fabric-loader:0.15.10"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.100.0+1.21.1"
    modImplementation "cabaletta:baritone-api-fabric:1.10.2"
}

tasks.withType(JavaCompile) {
    options.encoding = "UTF-8"
}

tasks.jar {
    archiveBaseName.set("autodump")
    archiveVersion.set("1.0.0")
}